# =====================================================================
# docker-compose.yml
# =====================================================================
# ЗАЧЕМ ЭТОТ ФАЙЛ (для чайника):
# Один командой `docker compose up` поднимает СРАЗУ 3 контейнера:
# бота, базу PostgreSQL и Redis — не нужно ставить их вручную
# на компьютер. Удобно для локальной разработки и тестирования.
#
# На Railway обычно PostgreSQL и Redis добавляются как отдельные
# managed-сервисы (через кнопку "+ New" в проекте Railway), а бот
# деплоится из этого же репозитория через Dockerfile — тогда
# DATABASE_URL и REDIS_URL Railway подставит сам в переменные окружения.
# =====================================================================

version: "3.9"

services:
  bot:
    build: .
    container_name: astramind_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"  # порт для приёма вебхуков Tribute.tg

  db:
    image: postgres:16-alpine
    container_name: astramind_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: astramind
      POSTGRES_PASSWORD: astramind
      POSTGRES_DB: astramind
    volumes:
      - astramind_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: astramind_redis
    restart: unless-stopped
    volumes:
      - astramind_redis_data:/data
    ports:
      - "6379:6379"

volumes:
  astramind_pg_data:
  astramind_redis_data:
